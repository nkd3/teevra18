name: Notion Change Log Sync

on:
  pull_request:
    types: [closed]

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Build payload and call Notion
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CHANGELOG_DB: ${{ secrets.NOTION_CHANGELOG_DB }}
        with:
          script: |
            const fetch = global.fetch;
            const pr = context.payload.pull_request;
            const mergedBy = pr.merged_by?.login || pr.user.login;
            const title = pr.title;
            const prUrl = pr.html_url;
            const mergedAt = pr.merged_at || new Date().toISOString();
            const headSha = pr.merge_commit_sha || pr.head?.sha || "";
            // Infer Stage from PR title prefix like "stage0:", else default 0
            const stageMatch = title.match(/stage\s*([0-9]+)/i);
            const stage = stageMatch ? parseInt(stageMatch[1], 10) : 0;
            // Infer Type from conventional prefixes
            let type = "change";
            if (/^feat:/i.test(title)) type = "feature";
            else if (/^fix:/i.test(title)) type = "fix";
            else if (/^docs:/i.test(title)) type = "docs";
            else if (/^chore:/i.test(title)) type = "chore";

            const body = {
              parent: { database_id: process.env.NOTION_CHANGELOG_DB },
              properties: {
                "Title": { title: [{ text: { content: title } }] },
                "Date": { date: { start: mergedAt } },
                "Stage": { number: stage },
                "Type": { select: { name: type } },
                "Summary": { rich_text: [{ text: { content: pr.body || "" } }] },
                "Author": { rich_text: [{ text: { content: mergedBy } }] },
                "PR": { url: prUrl },
                "Commit": { rich_text: [{ text: { content: headSha } }] }
              }
            };

            const resp = await fetch("https://api.notion.com/v1/pages", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.NOTION_TOKEN}`,
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json"
              },
              body: JSON.stringify(body)
            });

            if (!resp.ok) {
              const txt = await resp.text();
              core.setFailed(`Notion API error: ${resp.status} - ${txt}`);
            } else {
              core.info("Notion Change Log updated.");
            }
