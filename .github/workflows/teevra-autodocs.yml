name: Teevra Autodocs (Cause-of-Change)
on:
  pull_request:
    types: [closed]
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  notify-autodocs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Prepare payload
        id: prep
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || "";
            const body = pr.body || "";
            // Change type
            const type = title.startsWith("feat") ? "feat"
                       : title.startsWith("fix") ? "fix"
                       : "chore";
            // Stage (if you include "stage 3" in PR titles)
            const stageMatch = title.match(/stage\s*(\d+)/i);
            const stage = stageMatch ? stageMatch[1] : "";
            // Cause (optional one-liner anywhere: "Cause: incident|kpi|feature-request|refactor|dependency|config")
            const causeMatch = (title + " " + body).match(/Cause:\s*([a-zA-Z-]+)/i);
            const cause = causeMatch ? causeMatch[1] : "feature-request";
            const summary = title.replace(/\n/g," ").slice(0,140);
            core.setOutput("type", type);
            core.setOutput("stage", stage);
            core.setOutput("cause", cause);
            core.setOutput("summary", summary);
            core.setOutput("prNum", pr.number);
            core.setOutput("headSha", pr.merge_commit_sha);

      - name: POST to Autodocs Apps Script
        env:
          APPS_URL: ${{ secrets.APPS_SCRIPT_CHANGE_URL }}
          DOCS_JWT: ${{ secrets.DOCS_JWT }}
        run: |
          curl -s -X POST "$APPS_URL" \
            -H "Content-Type: application/json" \
            -d @- <<'JSON'
          {
            "jwt": "${{ env.DOCS_JWT }}",
            "change_type": "${{ steps.prep.outputs.type }}",
            "cause_of_change": "${{ steps.prep.outputs.cause }}",
            "stage": "${{ steps.prep.outputs.stage }}",
            "trigger_src": "github",
            "summary": "${{ steps.prep.outputs.summary }}",
            "pr": "${{ steps.prep.outputs.prNum }}",
            "commit_sha": "${{ steps.prep.outputs.headSha }}"
          }
          JSON
